# --- Prefix ---
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# --- General ---
set -g default-terminal "screen-256color"
set -g escape-time 0
set -g history-limit 50000
set -g mouse on
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

bind r source-file ~/.tmux.conf \; display "Reloaded!"

# --- Pane splits (vim-like) ---
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# --- Pane navigation (vim hjkl) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Pane resize (vim-like, repeatable) ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Pane swapping ---
bind > swap-pane -D
bind < swap-pane -U

# --- Window navigation ---
bind -r C-h previous-window
bind -r C-l next-window

# --- Vi copy mode ---
setw -g mode-keys vi
bind Escape copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
if-shell "command -v pbcopy" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'"
bind P paste-buffer
if-shell "command -v pbcopy" \
  "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'"

# --- Status bar ---
set -g status on
set -g status-justify centre
set -g status-style "bg=colour235,fg=colour121"
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#[fg=colour232,bg=colour154] #S #[fg=colour154,bg=colour238]#[fg=colour222,bg=colour238] #W #[fg=colour238,bg=colour235]#[fg=colour121,bg=colour235] #(whoami) "
set -g status-right "#[fg=colour121,bg=colour235] %R  %a  %Y-%m-%d #[fg=colour238,bg=colour235]#[fg=colour222,bg=colour238] #H #[fg=colour154,bg=colour238]#[fg=colour232,bg=colour154] #(rainbarf --battery --remaining --no-rgb) "

# --- Pane borders ---
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour154"

# --- Messages ---
set -g message-style "fg=colour222,bg=colour238"
set -g message-command-style "fg=colour222,bg=colour238"

# --- Window status ---
setw -g window-status-style "fg=colour121,bg=colour235"
setw -g window-status-current-style "fg=colour222,bg=colour238"
setw -g window-status-activity-style "fg=colour154,bg=colour235"
setw -g window-status-format " #I  #W "
setw -g window-status-current-format " #I  #W  #F "
